<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Ativação</title>
  <style>
    :root {
      --bg: #0b0d14;
      --bg2: #141722;
      --bg3: #1f2335;
      --border: #262b3d;
      --text: #e6e8ef;
      --text-dim: #8b90a5;
      --accent: #5a54f9;
      --accent-hover: #4841d9;
      --error: #ff5a5a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; display: flex; flex-direction: column; position: relative; overflow: hidden;
      align-items: center; justify-content: center;
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', sans-serif; user-select: none;
      -webkit-app-region: drag;
    }
    /* Mesmo fundo animado (zoom lento) da tela de carregamento inicial, pra
       ficar visualmente consistente com o resto do app. */
    .activation-bg {
      position: absolute; inset: -5%; z-index: 0;
      background: url('loading-bg.png') center center / cover no-repeat;
      animation: activation-zoom 14s ease-out forwards;
    }
    .activation-dim { position: absolute; inset: 0; z-index: 1; background: rgba(9, 3, 20, 0.55); }
    @keyframes activation-zoom { from { transform: scale(1); } to { transform: scale(1.18); } }
    #card {
      position: relative; z-index: 2; width: 340px; -webkit-app-region: no-drag; text-align: center;
      background: rgba(19, 19, 33, 0.55); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 28px 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    }
    .logo-icon {
      width: 40px; height: 40px; margin: 0 auto 14px; background: var(--accent);
      color: #fff; border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 20px; box-shadow: 0 0 15px rgba(90,84,249,0.3);
    }
    h1 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
    p.sub { font-size: 12px; color: var(--text-dim); margin: 0 0 20px; }
    input {
      width: 100%; padding: 10px 12px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; text-align: center;
      letter-spacing: 1px; outline: none; margin-bottom: 12px;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: .6; cursor: default; }
    #msg { min-height: 18px; font-size: 12px; margin-top: 10px; color: var(--error); }
  </style>
</head>
<body>
  <div class="activation-bg"></div>
  <div class="activation-dim"></div>
  <div id="card">
    <div class="logo-icon">⚡</div>
    <h1>Ative o Engine Wallpaper</h1>
    <p class="sub">Insira sua chave de licença para continuar</p>
    <input id="key" type="text" placeholder="EW-XXXXX-XXXXX-XXXXX-XXXXX" autofocus />
    <button id="submit">Ativar</button>
    <div id="msg"></div>
  </div>
  <script src="activation.js"></script>
</body>
</html>
