<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Instalando Engine Wallpaper</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body {
      width: 100%; height: 100%; margin: 0;
      background: var(--bg);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }
    #install-wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #install-log {
      -webkit-app-region: no-drag;
      font-family: Consolas, 'Courier New', monospace;
      font-size: 11px; line-height: 1.7; text-align: left;
      color: var(--text2);
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      height: 110px;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="install-wrap">
    <div class="dl-loading-content">
      <img src="logo-loading.png" alt="Instalando..." class="dl-loading-logo" />
      <h2 id="install-title">Instalando Engine Wallpaper</h2>
      <h3 id="install-subtitle">Preparando arquivos...</h3>
      <p id="install-info">Isso leva só alguns segundos</p>
      <div class="dl-progress-bar">
        <div class="dl-progress-fill" id="install-progress-fill"></div>
      </div>
      <div class="dl-progress-text" id="install-progress-text">0%</div>
      <div id="install-log"></div>
    </div>
  </div>
  <script src="installer.js"></script>
</body>
</html>
