<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #video-layer, #image-layer, #web-layer, #scene-layer {
      display: none;
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }
    #video-layer, #image-layer { object-fit: cover; }
    #web-layer { border: none; }
  </style>
</head>
<body>
  <video  id="video-layer"  autoplay loop muted playsinline></video>
  <img    id="image-layer"  />
  <webview id="web-layer"  allowpopups disablewebsecurity></webview>
  <canvas id="scene-layer"></canvas>
  <script src="wallpaper.js"></script>
</body>
</html>
