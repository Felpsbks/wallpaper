<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #video-layer, #image-layer, #scene-layer, #we-scene-layer {
      display: none;
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }
    #video-layer, #image-layer { object-fit: cover; }
    #we-scene-layer { overflow: hidden; background: #000; }

    #clock-overlay {
      display: none;
      position: fixed;
      z-index: 10;
      pointer-events: none;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      line-height: 1.25;
    }
    #clock-overlay.pos-top-left     { top: 5%;    left: 5%; }
    #clock-overlay.pos-top-right    { top: 5%;    right: 5%;   text-align: right; }
    #clock-overlay.pos-bottom-left  { bottom: 8%; left: 5%; }
    #clock-overlay.pos-bottom-right { bottom: 8%; right: 5%;   text-align: right; }
    #clock-overlay.pos-center       { top: 50%;   left: 50%;  transform: translate(-50%, -50%); text-align: center; }

    #clock-overlay .co-day  { font-weight: 600; letter-spacing: 0.35em; text-transform: uppercase; opacity: 0.9; }
    #clock-overlay .co-time { font-weight: 300; }
    #clock-overlay .co-date { font-weight: 400; opacity: 0.85; }

    #transition-overlay {
      position: fixed; inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      transition: opacity 350ms ease;
    }
  </style>
</head>
<body>
  <video  id="video-layer"    autoplay muted playsinline></video>
  <img    id="image-layer"  />
  <canvas id="scene-layer"></canvas>
  <div id="we-scene-layer"></div>
  <div id="clock-overlay"></div>
  <div id="transition-overlay"></div>
  <script src="host-bridge.js"></script>
  <script src="wallpaper.js"></script>
</body>
</html>
